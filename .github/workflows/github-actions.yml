name: assignment-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
    full-test:
        container: cuaesd/aesd-autotest:24-assignment4-buildroot
        runs-on: self-hosted
        timeout-minutes: 120
        steps:
          - uses: actions/checkout@v2
          - name: Checkout submodules
            run: git -c http.sslVerify=false submodule update --init --recursive
          - uses: webfactory/ssh-agent@v0.5.3
            with:
                ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          - name: Install Cisco certificate for Docker
            run: |
                  echo "Installing Cisco Root CA into runner trust store"
                  sudo mkdir -p /usr/local/share/ca-certificates/cisco
                  echo "${{ secrets.CISCO_CA_CERT }}" | sudo tee /usr/local/share/ca-certificates/cisco/cisco.crt > /dev/null
                  sudo update-ca-certificates
          - name: Pre-download zlib to correct folder
            run: |
                  # Criar diretório onde o Buildroot procura tarballs
                  sudo mkdir -p /home/runner/.dl
                  cd /home/runner/.dl

                  wget https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.xz
                  sha256sum zlib-1.3.1.tar.xz
          - name: Run full test
            env:
              GIT_SSH_COMMAND: "ssh -o StrictHostKeyChecking=no"
            run: ./full-test.sh
          - name: Cleanup
            if: always()
            run: |
              ssh-add -D
